name: diga_la_app
description: "Diga Lá - Comunicação Aumentativa e Alternativa para crianças autistas."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  flutter_tts: ^4.2.2
  flutter_riverpod: ^2.6.1
  shared_preferences: ^2.3.5
  package_info_plus: ^10.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  mocktail: ^1.0.4
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo.png"
  adaptive_icon_background: "#79ACCB"
  adaptive_icon_foreground: "assets/logo.png"
  min_sdk_android: 21
  remove_alpha_ios: true
  background_color_ios: "#79ACCB"

flutter:
  uses-material-design: true

  assets:
    - assets/logo.png
    - assets/feelings/

  fonts:
    - family: Nunito
      fonts:
        - asset: assets/fonts/Nunito-400.ttf
          weight: 400
        - asset: assets/fonts/Nunito-600.ttf
          weight: 600
        - asset: assets/fonts/Nunito-700.ttf
          weight: 700
        - asset: assets/fonts/Nunito-800.ttf
          weight: 800
